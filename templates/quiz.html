<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
</head>
<body>
    <form method="POST">
        <h2>Enter a score between 1 and 10 for each genre: </h2>
        <div class="quiz-container">
            {% for genre in genres %}
                <label>{{ genre }}</label>
                <input type="number"
                    name="{{ genre }}"
                    min="1"
                    max="10"
                    required>
                <br><br>
            {% endfor %}
        </div>
        <button type="submit">Submit</button>

    </form>
</body>
</html>
